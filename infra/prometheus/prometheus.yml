global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "orchestrator"
    static_configs:
      - targets: ["host.docker.internal:4000"]
    metrics_path: /metrics

  - job_name: "rag"
    static_configs:
      - targets: ["host.docker.internal:5000"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
