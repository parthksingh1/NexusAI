apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: nexusai
spec:
  replicas: 2
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      containers:
        - name: web
          image: ghcr.io/YOUR_ORG/nexusai-web:latest
          ports: [{ containerPort: 3000 }]
          env:
            - name: ORCHESTRATOR_URL
              value: "http://orchestrator:4000"
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: nexusai
spec:
  selector: { app: web }
  ports: [{ port: 80, targetPort: 3000 }]
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nexusai
  namespace: nexusai
spec:
  parentRefs:
    - name: nexusai-gateway
  hostnames: ["app.nexusai.example"]
  rules:
    - matches: [{ path: { type: PathPrefix, value: /api/orch } }]
      filters:
        - type: URLRewrite
          urlRewrite: { path: { type: ReplacePrefixMatch, replacePrefixMatch: / } }
      backendRefs: [{ name: orchestrator, port: 4000 }]
    - matches: [{ path: { type: PathPrefix, value: / } }]
      backendRefs: [{ name: web, port: 80 }]
