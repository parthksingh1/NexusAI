[project]
name = "nexusai"
version = "0.1.0"
description = "Official Python SDK for NexusAI"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.2",
    "websockets>=13.1",
    "pydantic>=2.9.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nexusai"]
