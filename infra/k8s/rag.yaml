apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag
  namespace: nexusai
spec:
  replicas: 2
  selector: { matchLabels: { app: rag } }
  template:
    metadata:
      labels: { app: rag }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
    spec:
      containers:
        - name: rag
          image: ghcr.io/YOUR_ORG/nexusai-rag:latest
          ports: [{ containerPort: 5000 }]
          envFrom:
            - configMapRef: { name: nexus-config }
            - secretRef: { name: nexus-secrets }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "4Gi" }
---
apiVersion: v1
kind: Service
metadata: { name: rag, namespace: nexusai }
spec:
  selector: { app: rag }
  ports: [{ port: 5000, targetPort: 5000 }]
