name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Install dependencies + generate Prisma client ────────────
  install:
    name: Install & generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @nexusai/db exec prisma generate
        continue-on-error: true

      - name: Build shared packages
        run: |
          pnpm --filter @nexusai/shared build    || true
          pnpm --filter @nexusai/llm-router build || true
          pnpm --filter @nexusai/db build        || true

  # ─── Optional TypeScript typecheck — advisory only ─────────────
  typecheck:
    name: Typecheck (advisory)
    runs-on: ubuntu-latest
    needs: install
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma
        run: pnpm --filter @nexusai/db exec prisma generate
        continue-on-error: true

      - name: Build deps
        run: |
          pnpm --filter @nexusai/shared build    || true
          pnpm --filter @nexusai/llm-router build || true
          pnpm --filter @nexusai/db build        || true

      - name: Typecheck
        run: pnpm typecheck
        continue-on-error: true

  # ─── Optional Python lint — advisory only ──────────────────────
  python:
    name: Python lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check apps/rag packages/sdk-py --output-format=github
        continue-on-error: true
