name: CI

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @nexusai/shared build
      - run: pnpm --filter @nexusai/llm-router build
      - run: pnpm --filter @nexusai/db prisma generate
      - run: pnpm typecheck

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff mypy
      - run: ruff check apps/rag packages/sdk-py

  docker-build:
    runs-on: ubuntu-latest
    needs: [typecheck]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build orchestrator
        uses: docker/build-push-action@v6
        with: { context: ., file: apps/orchestrator/Dockerfile, push: true, tags: "ghcr.io/${{ github.repository }}/orchestrator:${{ github.sha }}" }
      - name: Build rag
        uses: docker/build-push-action@v6
        with: { context: ., file: apps/rag/Dockerfile, push: true, tags: "ghcr.io/${{ github.repository }}/rag:${{ github.sha }}" }
      - name: Build web
        uses: docker/build-push-action@v6
        with: { context: ., file: apps/web/Dockerfile, push: true, tags: "ghcr.io/${{ github.repository }}/web:${{ github.sha }}" }
