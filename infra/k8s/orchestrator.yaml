apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: nexusai
spec:
  replicas: 3
  selector:
    matchLabels: { app: orchestrator }
  template:
    metadata:
      labels: { app: orchestrator }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: orchestrator
          image: ghcr.io/YOUR_ORG/nexusai-orchestrator:latest
          ports: [{ containerPort: 4000 }]
          envFrom:
            - configMapRef: { name: nexus-config }
            - secretRef: { name: nexus-secrets }
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "2Gi" }
          readinessProbe:
            httpGet: { path: /ready, port: 4000 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: nexusai
spec:
  selector: { app: orchestrator }
  ports: [{ port: 4000, targetPort: 4000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orchestrator
  namespace: nexusai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orchestrator
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
    - type: Pods
      pods:
        metric: { name: nexus_active_runs }
        target: { type: AverageValue, averageValue: "30" }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: orchestrator
  namespace: nexusai
spec:
  minAvailable: 2
  selector:
    matchLabels: { app: orchestrator }
