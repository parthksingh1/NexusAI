apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime
  namespace: nexusai
spec:
  replicas: 2
  selector: { matchLabels: { app: realtime } }
  template:
    metadata:
      labels: { app: realtime }
    spec:
      containers:
        - name: realtime
          image: ghcr.io/YOUR_ORG/nexusai-realtime:latest
          ports: [{ containerPort: 4200 }]
          envFrom:
            - configMapRef: { name: nexus-config }
            - secretRef: { name: nexus-secrets }
          resources:
            requests: { cpu: "300m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "2Gi" }
---
apiVersion: v1
kind: Service
metadata: { name: realtime, namespace: nexusai }
spec:
  selector: { app: realtime }
  ports: [{ port: 4200, targetPort: 4200 }]
